<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách sản phẩm</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Products</h2>
    <a th:href="@{/products/create}" class="btn btn-primary">Create New Product</a>
</div>

<table class="table table-hover table-bordered shadow-sm">
    <thead class="table-dark text-center">
    <tr>
        <th>#</th>
        <th>Name</th>
        <th>Price</th>
        <th>Image</th>
        <th>Category Name</th>
        <th>Action</th>
    </tr>
    </thead>
    <tbody class="text-center align-middle">
    <tr th:each="p : ${products}">
        <td th:text="${p.id}"></td>
        <td th:text="${p.name}"></td>
        <td th:text="${#numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></td>
        <td>
            <img th:src="@{'/images/' + ${p.image}}" width="60" height="60"
                 class="rounded border" style="object-fit: cover;"
                 th:if="${p.image != null}">
        </td>

        <td th:text="${p.category != null ? p.category.name : 'Không có danh mục'}"></td>

        <td>
            <a th:href="@{/products/edit/{id}(id=${p.id})}" class="btn btn-sm btn-secondary me-1">Edit</a>
            <a th:href="@{/products/delete/{id}(id=${p.id})}"
               class="btn btn-sm btn-danger"
               onclick="return confirm('Bạn có chắc chắn muốn xóa?')">Delete</a>
        </td>
    </tr>
    <tr th:if="${#lists.isEmpty(products)}">
        <td colspan="6" class="text-center text-muted">Chưa có sản phẩm nào.</td>
    </tr>
    </tbody>
</table>
</body>
</html>
